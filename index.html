<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XIRO Dashboard - Login</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0f0f1a 0%, #1a1a2e 50%, #16213e 100%);
            color: #eee;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .login-container {
            background: rgba(22, 33, 62, 0.9);
            border-radius: 20px;
            padding: 50px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }
        .logo {
            font-size: 3em;
            margin-bottom: 10px;
        }
        h1 { 
            color: #e94560; 
            font-size: 2.5em; 
            margin-bottom: 10px;
            letter-spacing: 5px;
        }
        .tagline {
            color: #4ecca3;
            margin-bottom: 30px;
            font-size: 1.1em;
        }
        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #aaa;
            font-size: 0.9em;
        }
        .form-group input {
            width: 100%;
            padding: 15px;
            border: 2px solid #333;
            border-radius: 10px;
            background: #0f0f1a;
            color: #eee;
            font-size: 1em;
            transition: border-color 0.3s;
        }
        .form-group input:focus {
            outline: none;
            border-color: #4ecca3;
        }
        .btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #e94560, #c73e54);
            border: none;
            border-radius: 10px;
            color: #fff;
            font-size: 1.1em;
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
            font-weight: 600;
            letter-spacing: 1px;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(233, 69, 96, 0.3);
        }
        .error {
            color: #e94560;
            margin-top: 15px;
            font-size: 0.9em;
            display: none;
        }
        .error.show {
            display: block;
        }
        .footer {
            margin-top: 30px;
            color: #666;
            font-size: 0.85em;
        }
        .footer a {
            color: #4ecca3;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">🔺</div>
        <h1>XIRO</h1>
        <div class="tagline">Recruitment Intelligence Platform</div>
        
        <form id="loginForm" onsubmit="return handleLogin(event)">
            <div class="form-group">
                <label for="password">Access Password</label>
                <input type="password" id="password" placeholder="Enter password" required autofocus>
            </div>
            <button type="submit" class="btn">Access Dashboard</button>
            <div id="error" class="error">Incorrect password. Please try again.</div>
        </form>
        
        <div class="footer">
            <p>ProQruit Recruitment System</p>
            <p style="margin-top: 10px;">Contact: <a href="mailto:xirosyst3m@gmail.com">xirosyst3m@gmail.com</a></p>
        </div>
    </div>

    <script>
        // Simple password auth - password is xiro2024
        const VALID_PASSWORD = 'xiro2024';
        
        function handleLogin(e) {
            e.preventDefault();
            const password = document.getElementById('password').value;
            const error = document.getElementById('error');
            
            if (password === VALID_PASSWORD) {
                // Store auth state
                sessionStorage.setItem('xiro_auth', 'true');
                // Redirect to dashboard
                window.location.href = 'home.html';
            } else {
                error.classList.add('show');
                document.getElementById('password').value = '';
            }
            return false;
        }
        
        // Check if already logged in
        if (sessionStorage.getItem('xiro_auth') === 'true') {
            window.location.href = 'home.html';
        }
    </script>
</body>
</html>
