<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProQruit Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); color: #eee; min-height: 100vh; display: flex; justify-content: center; align-items: center; }
        .container { max-width: 800px; margin: 20px auto; padding: 20px; }
        .header { text-align: center; margin-bottom: 40px; }
        .header h1 { color: #e94560; font-size: 2.5em; margin-bottom: 10px; }
        .header p { color: #888; font-size: 1.1em; }
        .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; }
        .card { background: #16213e; border-radius: 15px; padding: 25px; text-align: center; text-decoration: none; transition: all 0.3s; border: 1px solid #333; }
        .card:hover { transform: translateY(-5px); box-shadow: 0 10px 30px rgba(233, 69, 96, 0.2); border-color: #e94560; }
        .card .icon { font-size: 2.5em; margin-bottom: 15px; }
        .card h2 { color: #eee; margin-bottom: 10px; }
        .card p { color: #888; font-size: 0.9em; }
        .footer { text-align: center; margin-top: 40px; color: #666; font-size: 0.8em; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📊 ProQruit</h1>
            <p>Recruitment Intelligence Dashboard</p>
        </div>
        
        <div class="cards">
            <a href="dashboard.html" class="card">
                <div class="icon">📈</div>
                <h2>Dashboard</h2>
                <p>View candidate statistics and metrics</p>
            </a>
            
            <a href="candidates.html" class="card">
                <div class="icon">👥</div>
                <h2>Candidates</h2>
                <p>Browse and search candidate database</p>
            </a>
            
            <a href="harvester.html" class="card">
                <div class="icon">📤</div>
                <h2>CV Upload</h2>
                <p>Upload candidate resumes for processing</p>
            </a>
        </div>
        
        <div class="footer">
            <p>ProQruit Recruitment Intelligence • XIRO System</p>
        </div>
    </div>
    <script>
        if (sessionStorage.getItem('xiro_auth') !== 'true') {
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
